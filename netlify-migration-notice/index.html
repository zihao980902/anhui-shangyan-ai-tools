<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="12; url=http://101.132.195.124:3000/" />
    <title>网站已迁移服务器</title>
    <style>
      :root {
        color-scheme: light;
        --orange: #ff7a1a;
        --orange-deep: #c95000;
        --ink: #16211f;
        --muted: #64706d;
        --line: #ffd8b8;
        --bg: #fff8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(255, 122, 26, 0.12), transparent 42%),
          linear-gradient(315deg, rgba(255, 214, 170, 0.38), transparent 40%),
          var(--bg);
        color: var(--ink);
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      }

      main {
        width: min(980px, 100%);
        padding: clamp(30px, 7vw, 76px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 70px rgba(123, 66, 12, 0.14);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: var(--orange-deep);
        font-size: 17px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: clamp(40px, 7vw, 86px);
        line-height: 1.12;
        letter-spacing: 0;
      }

      .message {
        margin: 28px auto 0;
        max-width: 800px;
        color: var(--muted);
        font-size: clamp(22px, 3vw, 34px);
        line-height: 1.55;
        font-weight: 700;
      }

      .url {
        display: block;
        margin-top: 18px;
        color: var(--orange-deep);
        overflow-wrap: anywhere;
      }

      .actions {
        display: flex;
        justify-content: center;
        margin-top: 38px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 58px;
        padding: 0 30px;
        border-radius: 8px;
        background: var(--orange);
        color: #fff;
        font-size: 20px;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 14px 28px rgba(255, 122, 26, 0.28);
      }

      .note {
        margin: 24px 0 0;
        color: var(--muted);
        font-size: 16px;
      }

      @media (max-width: 640px) {
        body {
          padding: 18px;
        }

        main {
          padding: 28px 20px;
        }

        a {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">安徽上岩科技 内部AI 工具站</p>
      <h1>网站已迁移服务器</h1>
      <p class="message">
        密码未变，新网址是：
        <span class="url">http://101.132.195.124:3000/</span>
      </p>
      <div class="actions">
        <a href="http://101.132.195.124:3000/">打开新网站</a>
      </div>
      <p class="note">页面将在 12 秒后自动跳转。</p>
    </main>
  </body>
</html>
